# =============================================================================
# LiteLLM Proxy Configuration for Decepticon
# =============================================================================
# This file configures the LiteLLM Proxy server as the central LLM gateway.
#
# Model names use LiteLLM provider-prefix format (e.g., "anthropic/claude-sonnet-4-6")
# matching the names in botron/llm/models.py. Agents send these names directly;
# the proxy resolves them to the correct provider endpoint + API key.
#
# Features:
#   - Model routing: provider-prefix names map to actual API endpoints
#   - Load balancing: multiple entries per model_name for redundancy
#   - Usage tracking: logs all API calls with cost data
#   - Budget management: per-key spending limits
#   - Rate limiting: per-key RPM/TPM controls
#
# Docs: https://docs.litellm.ai/docs/proxy/configs

# --- Model Definitions ---
# model_name must match the constants in botron/llm/models.py exactly.

model_list:
  # ── Anthropic ────────────────────────────────────────────────────────
  - model_name: anthropic/claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI ───────────────────────────────────────────────────────────
  - model_name: openai/gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openai/gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # ── Google ───────────────────────────────────────────────────────────
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── MiniMax ──────────────────────────────────────────────────────────
  - model_name: minimax/MiniMax-M2.7
    litellm_params:
      model: openai/MiniMax-M2.7
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY

  # ── DeepSeek ─────────────────────────────────────────────────────────
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── xAI / Grok ───────────────────────────────────────────────────────
  - model_name: xai/grok-4
    litellm_params:
      model: openai/grok-4
      api_base: https://api.x.ai/v1
      api_key: os.environ/XAI_API_KEY

  - model_name: xai/grok-4-mini
    litellm_params:
      model: openai/grok-4-mini
      api_base: https://api.x.ai/v1
      api_key: os.environ/XAI_API_KEY

  # ── Groq (Llama, Mixtral inference) ──────────────────────────────────
  - model_name: groq/llama-3.3-70b-versatile
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq/llama-3.1-8b-instant
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq/mixtral-8x7b-32768
    litellm_params:
      model: groq/mixtral-8x7b-32768
      api_key: os.environ/GROQ_API_KEY

  # ── Together AI ──────────────────────────────────────────────────────
  - model_name: together/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
    litellm_params:
      model: together_ai/meta-llama/Llama-4-Maverick-17B-128E-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY

  - model_name: together/deepseek-ai/DeepSeek-V3
    litellm_params:
      model: together_ai/deepseek-ai/DeepSeek-V3
      api_key: os.environ/TOGETHER_API_KEY

  # ── Fireworks AI ─────────────────────────────────────────────────────
  - model_name: fireworks/llama-v3p1-70b-instruct
    litellm_params:
      model: fireworks_ai/accounts/fireworks/models/llama-v3p1-70b-instruct
      api_key: os.environ/FIREWORKS_API_KEY

  # ── Local LLM (Ollama) ──────────────────────────────────────────────
  - model_name: ollama/llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: os.environ/OLLAMA_API_BASE

# --- Router Settings ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 5
  timeout: 300
  retry_after: 30
  allowed_fails: 3
  cooldown_time: 60

# --- General Settings ---
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
